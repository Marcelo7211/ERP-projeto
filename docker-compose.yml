services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./ErpApi
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SqlServer: "Server=db,1433;Database=ErpImobiliarioDbDev;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;Encrypt=False"
      Jwt__Issuer: ErpApi.Dev
      Jwt__Audience: ErpApi.Client
      Jwt__SecretKey: erp-api-development-secret-key-at-least-32-chars
      Jwt__ExpiresInMinutes: 120
    ports:
      - "5288:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./erp-imobiliario
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5288
    ports:
      - "4173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlserver_data:
